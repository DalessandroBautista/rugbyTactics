services:
  - type: web
    name: rugby-tactics
    runtime: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # lo ponés a mano en el dashboard de Render
      - key: JWT_SECRET
        sync: false        # lo ponés a mano en el dashboard de Render
      - key: AUTH_CODE_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false        # API key de Resend (Render free bloquea SMTP saliente)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
